<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="6" fill="#050505"/>
  <!-- Bass clef -->
  <path
    d="M8 6 C8 6, 14 6, 17 9 C20 12, 20 16, 17 19 C14 22, 8 22, 8 19 C8 17, 10 15, 13 15 C16 15, 18 17, 16 20 L16 26"
    fill="none"
    stroke="#00F0FF"
    stroke-width="2.5"
    stroke-linecap="round"
    filter="url(#glow)"
  />
  <!-- Two dots -->
  <circle cx="21" cy="11" r="2" fill="#00F0FF" filter="url(#glow)"/>
  <circle cx="21" cy="17" r="2" fill="#00F0FF" filter="url(#glow)"/>
</svg>
