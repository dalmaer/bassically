<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "void": "#050505",
                        "surface": "#111113",
                        "neon-cyan": "#00F0FF",
                        "neon-magenta": "#FF00FF",
                        "neon-lime": "#CCFF00",
                        "metal-dark": "#333338",
                        "metal-light": "#4A4A52",
                        "text-main": "#EAEAEA",
                        "text-muted": "#71717A",
                    },
                    fontFamily: {
                        "display": ["Space Mono", "monospace"],
                        "ui": ["Rajdhani", "sans-serif"],
                        "code": ["JetBrains Mono", "monospace"],
                        "grotesk": ["Space Grotesk", "sans-serif"],
                    },
                    boxShadow: {
                        "glow-cyan": "0 0 10px #00F0FF",
                        "glow-magenta": "0 0 10px #FF00FF",
                        "glow-lime": "0 0 10px #CCFF00",
                    },
                    animation: {
                        'vibrate': 'vibrate 0.1s linear infinite',
                        'pulse-glow': 'pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        vibrate: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '25%': { transform: 'translateY(-1px)' },
                            '75%': { transform: 'translateY(1px)' },
                        },
                        'pulse-glow': {
                            '0%, 100%': { opacity: 1, boxShadow: '0 0 15px #00F0FF' },
                            '50%': { opacity: .7, boxShadow: '0 0 5px #00F0FF' },
                        }
                    }
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 8px;

        }
        ::-webkit-scrollbar-track {
            background: #050505;
        }
        ::-webkit-scrollbar-thumb {
            background: #333338;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4A4A52;
        }

        /* Fret spacing logic */
        .fret-1 { width: 9.5%; }
        .fret-2 { width: 9%; }
        .fret-3 { width: 8.5%; }
        .fret-4 { width: 8%; }
        .fret-5 { width: 7.5%; }
        .fret-6 { width: 7.1%; }
        .fret-7 { width: 6.7%; }
        .fret-8 { width: 6.3%; }
        .fret-9 { width: 5.9%; }
        .fret-10 { width: 5.6%; }
        .fret-11 { width: 5.3%; }
        .fret-12 { width: 5%; }

        /* Interaction styling */
        .string-interactive:hover .note-ghost {
            opacity: 1;
            transform: scale(1);
        }
        
        .note-active {
            animation: pulse-glow 1.5s infinite;
        }

        /* Realistic Dark Ebony Wood Texture */
        .neck-wood {
            background-color: #0d0d0f;
            background-image: 
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px),
                radial-gradient(circle at 50% 50%, rgba(20, 20, 25, 0.8), #0a0a0c),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.02' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.07'/%3E%3C/svg%3E");
            background-size: 100% 100%, 100% 100%, 400px 400px;
        }

        /* Round-wound Metallic String Effect */
        .string-bass {
            background: linear-gradient(to bottom, #7a7a7a 0%, #d1d1d1 50%, #4a4a4a 100%);
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.6), 0 2px 4px -1px rgba(0, 0, 0, 0.4);
        }
        .string-bass::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: repeating-linear-gradient(90deg, transparent, transparent 1px, rgba(0,0,0,0.3) 1.5px, transparent 2px);
            background-size: 3px 100%;
            opacity: 0.6;
        }
    </style>
